<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mando Central - El Hortelano</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="contenedor-principal">
        <header>
            <h1>Mando Central - El Hortelano</h1>
            <p id="reloj">--:--:--</p>
        </header>

        <div class="panel-grafica">
            <canvas id="grafica-temperatura" height="100"></canvas>
        </div>

        <form id="formulario-higiene">
            <fieldset>
                <legend>Plan de Agua e Higiene (11:00 AM)</legend>
                <div class="grupo-control">
                    <label for="cloro">Cloro Libre Residual (mg/L):</label>
                    <input type="number" id="cloro" step="0.1" required>
                </div>
                <div class="grupo-control">
                    <label>Examen Organoléptico:</label>
                    <div class="botones-binarios">
                        <input type="radio" id="org-ok" name="organoleptico" value="Normal" required>
                        <label for="org-ok" class="btn-verde">NORMAL</label>
                        <input type="radio" id="org-mal" name="organoleptico" value="Anómalo">
                        <label for="org-mal" class="btn-rojo">ANÓMALO</label>
                    </div>
                </div>
                <div class="grupo-control">
                    <label for="temperatura">Temperatura Cámara (ºC):</label>
                    <input type="number" id="temperatura" step="0.1" required>
                </div>
            </fieldset>
            <button type="submit" class="btn-inmenso">FIRMAR PGH</button>
        </form>

        <form id="formulario-trazabilidad" style="margin-top: 40px;">
            <fieldset>
                <legend>Trazabilidad Total (Dictado Activo)</legend>
                
                <div class="grupo-control-voz"><label for="lote-tomate">Lote Tomates:</label><div class="input-voz"><input type="text" id="lote-tomate" required><button type="button" class="btn-micro" onclick="dictarLote('lote-tomate')">🎤</button></div></div>
                <div class="grupo-control-voz"><label for="lote-vinagre">Lote Vinagre:</label><div class="input-voz"><input type="text" id="lote-vinagre" required><button type="button" class="btn-micro" onclick="dictarLote('lote-vinagre')">🎤</button></div></div>
                <div class="grupo-control-voz"><label for="lote-sal">Lote Sal:</label><div class="input-voz"><input type="text" id="lote-sal" required><button type="button" class="btn-micro" onclick="dictarLote('lote-sal')">🎤</button></div></div>
                <div class="grupo-control-voz"><label for="lote-ajo">Lote Ajo:</label><div class="input-voz"><input type="text" id="lote-ajo" required><button type="button" class="btn-micro" onclick="dictarLote('lote-ajo')">🎤</button></div></div>
                <div class="grupo-control-voz"><label for="lote-aceite">Lote Aceite:</label><div class="input-voz"><input type="text" id="lote-aceite" required><button type="button" class="btn-micro" onclick="dictarLote('lote-aceite')">🎤</button></div></div>
                <div class="grupo-control-voz"><label for="lote-limon">Lote Limón:</label><div class="input-voz"><input type="text" id="lote-limon" required><button type="button" class="btn-micro" onclick="dictarLote('lote-limon')">🎤</button></div></div>
                <div class="grupo-control-voz"><label for="lote-pimiento">Lote Pimiento:</label><div class="input-voz"><input type="text" id="lote-pimiento" required><button type="button" class="btn-micro" onclick="dictarLote('lote-pimiento')">🎤</button></div></div>
                <div class="grupo-control-voz"><label for="lote-envase">Lote Envases:</label><div class="input-voz"><input type="text" id="lote-envase" required><button type="button" class="btn-micro" onclick="dictarLote('lote-envase')">🎤</button></div></div>
                <div class="grupo-control-voz"><label for="litros-prod">Litros Producidos:</label><div class="input-voz"><input type="number" id="litros-prod" required><button type="button" class="btn-micro" onclick="dictarLote('litros-prod')">🎤</button></div></div>
                <div class="grupo-control-voz"><label for="lote-salida">Lote Venta/Salida:</label><div class="input-voz"><input type="text" id="lote-salida" required><button type="button" class="btn-micro" onclick="dictarLote('lote-salida')">🎤</button></div></div>

                <div class="grupo-firma" style="margin-top: 20px;">
                    <label>Firma Biométrica del Responsable:</label>
                    <canvas id="lienzo-firma" width="300" height="150"></canvas>
                    <button type="button" id="btn-limpiar-firma">Limpiar Cristal</button>
                </div>
            </fieldset>

            <button type="submit" class="btn-inmenso" style="background-color: #2980b9;">SELLAR LOTE COMPLETO</button>
        </form>

        <hr style="margin: 30px 0; border: 1px solid #bdc3c7;">
        <button type="button" id="btn-imprimir-traza" class="btn-inmenso" style="background-color: #8e44ad;">🖨️ IMPRIMIR REGISTRO PDF</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
